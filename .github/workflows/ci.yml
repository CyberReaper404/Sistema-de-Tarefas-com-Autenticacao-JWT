name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-api:
    name: Python API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall app run.py smoke_test.py

      - name: Run smoke test
        run: python smoke_test.py

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build app
        run: npm run build

  dotnet-api:
    name: .NET API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore API
        run: dotnet restore
        working-directory: backend-dotnet

      - name: Build API
        run: dotnet build -c Release --no-restore
        working-directory: backend-dotnet

      - name: Restore tests
        run: dotnet restore
        working-directory: backend-dotnet-tests

      - name: Run tests
        run: dotnet test -c Release --no-restore
        working-directory: backend-dotnet-tests
