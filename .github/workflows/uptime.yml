name: Uptime Check

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    name: Check deployed services
    runs-on: ubuntu-latest
    steps:
      - name: Validate configuration
        env:
          API_HEALTH_URL: ${{ vars.API_HEALTH_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          if [ -z "$API_HEALTH_URL" ] || [ -z "$FRONTEND_URL" ]; then
            echo "Configure API_HEALTH_URL and FRONTEND_URL in repository variables."
            exit 1
          fi

      - name: Check API health
        env:
          API_HEALTH_URL: ${{ vars.API_HEALTH_URL }}
        run: curl --fail --silent --show-error "$API_HEALTH_URL"

      - name: Check frontend
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: curl --fail --silent --show-error "$FRONTEND_URL"
