services:
  - type: web
    name: todo-api-python
    env: python
    rootDir: backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_MINUTES
        value: 30
      - key: JWT_REFRESH_TOKEN_DAYS
        value: 7
      - key: CORS_ALLOWED_ORIGINS
        sync: false
